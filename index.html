<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rastreamento GPS</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
margin:0;
padding:0;
height:100%;
}

#map{
height:100vh;
width:100%;
}

.info{
position:absolute;
top:10px;
left:10px;
z-index:9999;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

</style>

</head>

<body>

<div class="info">
<h3>Rastreamento</h3>
<div id="status">
Conectando...
</div>
</div>

<div id="map"></div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
'https://fqbxhkcdefwsuefifygk.supabase.co',
'COLE_SUA_CHAVE_AQUI'
);

const MOTORISTA_ID =
'SEU_ID_AQUI';

const status =
document.getElementById('status');

const map =
L.map('map').setView([-14.235,-51.925],4);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

let marcador = null;

function atualizarMapa(lat,lng){

const pos = [lat,lng];

if(!marcador){

marcador =
L.marker(pos).addTo(map);

}else{

marcador.setLatLng(pos);

}

map.setView(pos,17);

}

async function enviarLocalizacao(lat,lng){

await supabase
.from('motoristas')
.update({
latitude:lat,
longitude:lng,
atualizado_em:new Date()
})
.eq('id',MOTORISTA_ID);

}

navigator.geolocation.watchPosition(

async(pos)=>{

const lat =
pos.coords.latitude;

const lng =
pos.coords.longitude;

status.innerHTML =
`Latitude: ${lat}<br>
Longitude: ${lng}`;

atualizarMapa(lat,lng);

await enviarLocalizacao(lat,lng);

},

(err)=>{

status.innerHTML =
'Erro GPS: '+err.message;

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

supabase
.channel('gps')
.on(
'postgres_changes',
{
event:'UPDATE',
schema:'public',
table:'motoristas'
},
(payload)=>{

const lat =
payload.new.latitude;

const lng =
payload.new.longitude;

atualizarMapa(lat,lng);

}
)
.subscribe();

</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>
</html>
